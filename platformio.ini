; Arquivo de Configuração do Projeto PlatformIO
;
;   Opções de Build: flags de build, filtro de fonte
;   Opções de Upload: porta de upload customizada, velocidade e flags extras
;   Opções de Biblioteca: dependências, armazenamentos extras de biblioteca
;   Opções Avançadas: script extras
;
; Por favor visite a documentação para outras opções e exemplos
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = willy_ili9341_custom

;uncomment to not use global dirs to avoid possible conflicts
;platforms_dir = .pio/platforms
;packages_dir = .pio/packages
;build_cache_dir = .pio/build_cache
;cache_dir = .pio/cache
boards_dir = C:\Users\leleb\OneDrive\Documentos\Projetos\Bruce\Willy_ESP_s3\boards\_boards_json

; =============================================================================
; Willy ESP32-S3-DevKitC-1 + ILI9341 2.4" TFT SPI — Configuração Única
; =============================================================================
[env:willy_ili9341_custom]
board = ESP32-S3-DevKitC-1-N8R2
board_build.partitions = custom_8Mb.csv
build_src_filter =
	${env.build_src_filter}
	-<../.pio/libdeps/${PIOENV}/ESP8266Audio/src/AudioOutputI2S.cpp>
	-<../.pio/libdeps/${PIOENV}/ESP8266Audio/src/AudioOutputI2SNoDAC.cpp>
	-<../.pio/libdeps/${PIOENV}/ESP8266Audio/src/AudioOutputSPDIF.cpp>
build_unflags =
	-DARDUINO_USB_CDC_ON_BOOT=0
build_flags =
	${env.build_flags}
	-Iboards/ESP32-S3-WROOM-1-N8R2
	-Wno-narrowing
	-DFASTLED_RMT_BUILTIN_DRIVER=1
	-DCORE_DEBUG_LEVEL=4
	-DARDUINO_USB_CDC_ON_BOOT=1

	; ═══════════════════════════════════════════════════════════════════
	; LED RGB Built-in (NeoPixel WS2812)
	; ═══════════════════════════════════════════════════════════════════
	-DRGB_LED=48

	; ═══════════════════════════════════════════════════════════════════
	; Barramento I2C (PN532 NFC 0x24, DS3231 RTC 0x68, PAJ7620 0x73)
	; ═══════════════════════════════════════════════════════════════════
	-DGROVE_SDA=8
	-DGROVE_SCL=17

	; ═══════════════════════════════════════════════════════════════════
	; Barramento SPI — Linhas Comuns (TFT, Touch, SD, NRF×2, CC1101)
	; ═══════════════════════════════════════════════════════════════════
	-DSPI_SCK_PIN=12
	-DSPI_MOSI_PIN=11
	-DSPI_MISO_PIN=13
	-DSPI_SS_PIN=10

	; ═══════════════════════════════════════════════════════════════════
	; Display TFT ILI9341 2.4" (320×240, SPI)
	; ═══════════════════════════════════════════════════════════════════
	-DHAS_SCREEN=1
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DROTATION=1
	-DBACKLIGHT=3
	-DMINBRIGHT=160
	-DTFT_DISPON=0x29
	-DTFT_DISPOFF=0x28
	-DTFT_CS=10
	-DTFT_DC=9
	-DTFT_RST=14
	-DTFT_MOSI=11
	-DTFT_MISO=13
	-DTFT_SCLK=12
	-DTFT_BL=3
	-DTFT_BACKLIGHT_ON=HIGH
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=20000000
	-DSPI_READ_FREQUENCY=10000000
	-DTFT_RGB_ORDER=TFT_BGR
	-DLVGL_USE_DMA=0

	; ═══════════════════════════════════════════════════════════════════
	; Touch XPT2046 (SPI Compartilhado)
	; ═══════════════════════════════════════════════════════════════════
	-DHAS_TOUCH=1
	-DTOUCH_CS=15
	-DTOUCH_IRQ=36
	-DSPI_TOUCH_FREQUENCY=2500000

	; ═══════════════════════════════════════════════════════════════════
	; Cartão Micro SD (SPI Compartilhado)
	; ═══════════════════════════════════════════════════════════════════
	-DSDCARD_CS=38
	-DSDCARD_SCK=12
	-DSDCARD_MISO=13
	-DSDCARD_MOSI=11

	; ═══════════════════════════════════════════════════════════════════
	; NRF24L01+PA+LNA #1
	; ═══════════════════════════════════════════════════════════════════
	-DNRF24_SCK_PIN=12
	-DNRF24_MISO_PIN=13
	-DNRF24_MOSI_PIN=11
	-DNRF24_SS_PIN=16
	-DNRF24_CE_PIN=21
	-DNRF24_CS_PIN=16

	; ═══════════════════════════════════════════════════════════════════
	; NRF24L01+PA+LNA #2 (pinos extras para segundo módulo)
	; ═══════════════════════════════════════════════════════════════════
	-DNRF24_CS2_PIN=35
	-DNRF24_CE2_PIN=37

	; ═══════════════════════════════════════════════════════════════════
	; CC1101 Sub-GHz 433MHz
	; ═══════════════════════════════════════════════════════════════════
	-DCC1101_SCK_PIN=12
	-DCC1101_MISO_PIN=13
	-DCC1101_MOSI_PIN=11
	-DCC1101_SS_PIN=18
	-DCC1101_GDO0_PIN=33
	-DCC1101_GDO2_PIN=34
	-DCC1101_CS_PIN=18
	-DCC1101_GDO0=33
	-DCC1101_GDO2=34

	; ═══════════════════════════════════════════════════════════════════
	; GPS NEO-6M (UART1)
	; ═══════════════════════════════════════════════════════════════════
	-DGPS_SERIAL_TX=40
	-DGPS_SERIAL_RX=39
	-DGPS_BAUD=9600

	; ═══════════════════════════════════════════════════════════════════
	; IR — TX/RX LEDs (YS-IRTM IR Serial TX=1, RX=47)
	; ═══════════════════════════════════════════════════════════════════
	-DTXLED=1
	-DRXLED=47
	-DLED_ON=HIGH
	-DLED_OFF=LOW
	-DIR_TX_PINS='{{"IR TX", 1}, {"Grove W", GROVE_SCL}, {"Grove Y", GROVE_SDA}}'
	-DIR_RX_PINS='{{"IR RX", 47}, {"Grove W", GROVE_SCL}, {"Grove Y", GROVE_SDA}}'

	; ═══════════════════════════════════════════════════════════════════
	; RF TX/RX Pins (CC1101 / rc-switch)
	; ═══════════════════════════════════════════════════════════════════
	-DRF_TX_PINS='{{"M5 RF433T", GROVE_SDA}, {"Grove W", GROVE_SCL}, {"Grove Y", GROVE_SDA}}'
	-DRF_RX_PINS='{{"M5 RF433R", GROVE_SCL}, {"Grove W", GROVE_SCL}, {"Grove Y", GROVE_SDA}}'

	; ═══════════════════════════════════════════════════════════════════
	; INMP441 Microfone I2S
	; ═══════════════════════════════════════════════════════════════════
	-DI2S_SCK_PIN=41
	-DI2S_WS_PIN=42
	-DI2S_SD_PIN=2

	; ═══════════════════════════════════════════════════════════════════
	; Joystick KY-023 (Analógico)
	; ═══════════════════════════════════════════════════════════════════
	-DJOY_X_PIN=4
	-DJOY_Y_PIN=5
	-DJOY_BTN_PIN=6

	; ═══════════════════════════════════════════════════════════════════
	; Botões / UI / Nome do Dispositivo
	; ═══════════════════════════════════════════════════════════════════
	-DFP=1
	-DFM=2
	-DFG=3
	-DBTN_ALIAS='"OK"'
	-DLOAD_GLCD=1
	-DLOAD_FONT2=1
	-DLOAD_FONT4=1
	-DDEVICE_NAME='"ESP32-S3 DevKitC-1 (Willy)"'

lib_deps =
	${env.lib_deps}
	adafruit/RTClib@^2.1.4

monitor_port = COM6
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, colorize
monitor_dtr = 0
monitor_rts = 0

[env]
platform = espressif32@55.3.36 ; Was https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
           ;https://github.com/pioarduino/platform-espressif32/releases/download/55.03.34/platform-espressif32.zip ; Arduino 3.3.4
		   ;https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip ; Last Version
platform_packages =
    framework-arduinoespressif32-libs @ https://github.com/bmorcelli/esp32-arduino-lib-builder/releases/download/idf-release_v5.5/bruce_esp32-arduino-libs-20260123-153546.zip ; Arduino 3.3.6
	;framework-arduinoespressif32-libs @ https://github.com/bmorcelli/esp32-arduino-lib-builder/releases/download/idf-release_v5.5/bruce_esp32-arduino-libs-20251205-131242.zip ; Arduino 3.3.4
	;framework-arduinoespressif32-libs @ https://github.com/bmorcelli/esp32-arduino-lib-builder/releases/download/idf-release_v5.5/esp32-arduino-libs-20250919-170356.zip ; Arduino 3.3.1

monitor_filters = esp32_exception_decoder, send_on_enter
framework = arduino
lib_compat_mode = strict
board_build.variants_dir = boards
board_build.filesystem = littlefs
build_src_flags =
	; warnings:
	-Wall
	-Wclobbered
	-Wempty-body
	-Wignored-qualifiers
	; -Wmissing-field-initializers
	-Wsign-compare ; re-enabled as per user request to fix all warnings
	; -Wno-narrowing
	; -Wno-ignored-qualifiers
	; -Wno-deprecated-declarations
	; -Wno-deprecated-enum-enum-conversion
	; -Wno-unused-but-set-variable
	-Wno-cpp
	; -Wno-format-overflow
	; -Wno-format-truncation
	-Woverloaded-virtual=0
	-Wtype-limits
	; -Wno-unused-label
	; -Wno-comment
	; -Wno-unused-variable
	; -Wno-narrowing
	; warnings end

; build_unflags = -Os ; uncomment this line and "-O2" for speed optimisations, but bigger size

; Specify the path to your 32bits GCC compiler here, if it was not detected
;mqjs_host_cc = C:/msys64/mingw32/bin/gcc.exe

build_src_filter =
	+<*>
	-<.git/>
	-<.svn/>
	-<modules/bjs_interpreter/mqjs_stdlib.c>

build_flags =
	-DBRUCE_VERSION='"dev"'
	-DEEPROMSIZE=128
	-DLH=8
	-DLW=6
	-Os
	-Wl,--print-memory-usage
	-Wl,--gc-sections
	-DGIT_COMMIT_HASH='"Homebrew"'
	-DFASTLED_RMT_BUILTIN_DRIVER=1 	; https://github.com/FastLED/FastLED/blob/67436be11fc3b7be611cdf9011f31c4f76817741/src/platforms/esp/32/rmt_4/idf4_clockless_rmt_esp32.h#L25-L33
								; This setting let RF Spectrum to work with LED interface with FastLED on ESP32-S3

	-D CONFIG_ASYNC_TCP_STACK_SIZE=4096	; Reduces stack size for Async TCP to save memory
	-DCONFIG_ASYNC_TCP_RUNNING_CORE=1  ;
	-DCONFIG_ASYNC_TCP_USE_WDT=0	   ; Disables the Watchdog timer on Async TCP, to avoid restartings during file uploads
	-DGEN_MQJS_HEADERS		; Enable generation of mquickjs headers

extra_scripts =
	pre:scripts/patch.py
	pre:scripts/patch_i2s.py
	pre:scripts/pre_build_current_year.py
	pre:scripts/gen_mqjs_headers.py
	pre:scripts/fix_compiler_flags.py
	post:scripts/build.py

